name: partsrunner
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  flutter_screenutil: ^5.9.0
  shared_preferences: ^2.5.4
  flutter_intl_phone_field: ^0.0.7
  pin_code_fields: ^9.0.0

  http: ^1.6.0
  hive: ^2.2.3
  go_router: ^17.1.0
  google_fonts: ^6.2.1
  dio: ^5.9.2
  flutter_dotenv: ^6.0.0
  geolocator: ^14.0.2
  date_picker_plus: ^7.0.0
  flutter_stripe: ^12.5.0
  webview_flutter: ^4.13.1
  flutter_secure_storage: ^10.0.0
  google_maps_flutter: ^2.17.0
  flutter_polyline_points: ^2.1.0
  socket_io_client: ^3.1.4
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: Industry
      fonts:
        - asset: assets/fonts/Industry-Medium.ttf
          weight: 500
        - asset: assets/fonts/Industry-Bold.ttf
          weight: 700

  uses-material-design: true

  assets:
     - assets/images/
     - assets/icons/
     - .env